<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ariadne — process graph inspector</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='none' stroke='%235b6b82' stroke-width='2'/%3E%3Cpath d='M8 20 C 12 8, 20 24, 24 12' fill='none' stroke='%23d97706' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Ariadne</h1>
        <span id="status">loading graph…</span>
      </header>
      <nav id="sidebar" aria-label="Nodes by type"></nav>
      <main id="diagram-pane">
        <div id="diagram-toolbar" role="group" aria-label="Diagram zoom">
          <button id="zoom-100" type="button" aria-pressed="true">100%</button>
          <button id="zoom-fit" type="button" aria-pressed="false">Fit</button>
        </div>
        <div id="mermaid-container"></div>
      </main>
      <aside id="detail-pane">
        <p class="empty-state">Select a node to see its details and evidence.</p>
      </aside>
    </div>

    <!-- Vendored locally -- no CDN, this must work with no internet. -->
    <script src="/static/vendor/mermaid.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
